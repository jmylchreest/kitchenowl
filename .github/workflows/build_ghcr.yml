name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - "kitchenowl/**"
      - "backend/**"
      - "Dockerfile"
    tags:
      - "v*"
      - "beta-v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-combined:
    name: Build combined image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="${REPO,,}"
          BASE="$REGISTRY/$REPO_LOWER/kitchenowl"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tags=${BASE}:latest,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/beta-v* ]]; then
            echo "tags=${BASE}:beta,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${BASE}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push combined image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="${REPO,,}"
          BASE="$REGISTRY/$REPO_LOWER/kitchenowl-backend"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tags=${BASE}:latest,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/beta-v* ]]; then
            echo "tags=${BASE}:beta,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${BASE}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="${REPO,,}"
          BASE="$REGISTRY/$REPO_LOWER/kitchenowl-web"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tags=${BASE}:latest,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/beta-v* ]]; then
            echo "tags=${BASE}:beta,${BASE}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${BASE}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./kitchenowl
          file: ./kitchenowl/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
