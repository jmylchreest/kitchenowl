name: Build Mobile Apps

on:
  push:
    branches: [fork/main]
    paths:
      - "kitchenowl/**"
  pull_request:
    branches: [fork/main]
    paths:
      - "kitchenowl/**"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Clone Flutter repository with stable channel
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --no-analytics

      - run: flutter packages get
        working-directory: kitchenowl

      - name: Create temporary signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/ci-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 1 \
            -alias ci \
            -storepass changeit -keypass changeit \
            -dname "CN=CI Build, O=KitchenOwl Fork, C=US"
          cat > key.properties <<EOF
          storeFile=ci-keystore.jks
          keyAlias=ci
          storePassword=changeit
          keyPassword=changeit
          EOF
        working-directory: kitchenowl/android

      - name: Build APK
        run: flutter build apk --release
        working-directory: kitchenowl

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchenowl-android-apk
          path: kitchenowl/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Flutter repository with stable channel
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --no-analytics

      - run: flutter packages get
        working-directory: kitchenowl

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        working-directory: kitchenowl

      - name: Archive iOS build
        run: |
          cd kitchenowl/build/ios/iphoneos
          tar czf "$GITHUB_WORKSPACE/kitchenowl-ios-unsigned.tar.gz" Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchenowl-ios-unsigned
          path: kitchenowl-ios-unsigned.tar.gz
          retention-days: 30

  release:
    name: Update dev pre-release
    needs: [build-android, build-ios]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: kitchenowl-android-apk
          path: artifacts/

      - name: Download iOS build
        uses: actions/download-artifact@v4
        with:
          name: kitchenowl-ios-unsigned
          path: artifacts/

      - name: Rename artifacts with commit info
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          mv artifacts/app-release.apk "artifacts/kitchenowl-android-${SHORT_SHA}.apk"
          mv artifacts/kitchenowl-ios-unsigned.tar.gz "artifacts/kitchenowl-ios-unsigned-${SHORT_SHA}.tar.gz"

      - name: Create or update dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Delete existing dev release if present
          gh release delete dev --yes 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true

          # Create new pre-release
          gh release create dev \
            --prerelease \
            --title "Dev Build (${SHORT_SHA})" \
            --notes "$(cat <<EOF
          **Automated dev build from \`fork/main\`**

          Commit: ${GITHUB_SHA}
          Message: ${COMMIT_MSG}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          > These builds are unsigned/CI-signed and intended for testing only.
          > Android APK must be sideloaded. iOS build is unsigned and requires re-signing.
          EOF
          )" \
            artifacts/kitchenowl-android-${SHORT_SHA}.apk \
            artifacts/kitchenowl-ios-unsigned-${SHORT_SHA}.tar.gz
